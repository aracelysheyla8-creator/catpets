<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Doações ONG - CATPET</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.card {
    background: white;
    width: 250px;
    padding: 15px;
    margin: 20px;
    display: inline-block;
    border-radius: 10px;
}

button {
    margin: 5px;
    padding: 8px;
    cursor: pointer;
}

.doar {
    background: green;
    color: white;
    border: none;
}
</style>

</head>

<body>

<h1>Doações CATPET 🐾</h1>
<p>Escolha uma ONG para ajudar</p>

<!-- ONG 1 -->

<div class="card">
<h3>Cão Sem Dono</h3>
<p>Ajuda cães e gatos abandonados</p>

<button>R$10</button> <button>R$20</button> <button>R$50</button>

<br><br> <button class="doar">Doar</button>

</div>

<!-- ONG 2 -->

<div class="card">
<h3>Canto da Terra</h3>
<p>Protege animais silvestres</p>

<button>R$15</button> <button>R$30</button> <button>R$60</button>

<br><br> <button class="doar">Doar</button>

</div>

<!-- ONG 3 -->

<div class="card">
<h3>Instituto Caramelo</h3>
<p>Campanhas de adoção</p>

<button>R$20</button> <button>R$40</button> <button>R$80</button>

<br><br> <button class="doar">Doar</button>

</div>

</body>
</html>
